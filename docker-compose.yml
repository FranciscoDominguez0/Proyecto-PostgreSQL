services:

  db:
    image: postgres:15-alpine
    container_name: vetai_db
    restart: always
    env_file:
      - backend/.env
    expose:
      - "5432"
    networks:
      - vetai-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vetai_backend
    restart: always
    env_file:
      - backend/.env
    expose:
      - "8000"
    depends_on:
      - db
    networks:
      - vetai-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vetai_frontend
    restart: always
    env_file:
      - backend/.env
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - vetai-network
      - red-proxy

networks:
  vetai-network:
    driver: bridge

  red-proxy:
    external: true