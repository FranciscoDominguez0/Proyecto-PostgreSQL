services:

  db:
    image: postgres:15-alpine
    container_name: vetai_db
    restart: always
    env_file: backend/.env
    ports:
      - "127.0.0.1:5432:5432" 
   
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vetai_backend
    restart: always
    env_file: backend/.env
    expose:
      - "8000"
    depends_on:
      - db


  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vetai_frontend
    restart: always
    env_file: backend/.env
    expose:
      - "3000"
    depends_on:
      - backend

networks:
  default:
    external: true
    name: red-proxy
