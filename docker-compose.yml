version: '3.8'

services:
  # 1. Base de datos PostgreSQL - Sistema Veterinario
  db:
    image: postgres:15-alpine
    container_name: vetai_db
    restart: always
    environment:
      POSTGRES_DB: veterinaria_db
      POSTGRES_USER: fran2003
      POSTGRES_PASSWORD: 4e369CBEAD
    ports:
      - "9093:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vetai_network

  # 2. Backend (FastAPI API) - VetAI
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: vetai_backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=veterinaria_db
      - DB_USER=fran2003
      - DB_PASSWORD=4e369CBEAD
      - DEEPSEEK_API_KEY=
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
    ports:
      - "9090:8000"
    depends_on:
      - db
    networks:
      - vetai_network

  # 3. Frontend (Reflex App) - VetAI
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: vetai_frontend
    restart: always
    environment:
      - BACKEND_URL=http://backend:8000
      - API_URL=http://localhost:9091
    ports:
      - "9092:9092"
      - "9091:9091"
    depends_on:
      - backend
    networks:
      - vetai_network

volumes:
  postgres_data:

networks:
  vetai_network:
    driver: bridge
